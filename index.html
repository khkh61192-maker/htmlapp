    <script>
        const CONFIG = {
            FINMIND_TOKEN: "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJkYXRlIjoiMjAyNi0wMi0wMyAxNzoxNDo0MSIsInVzZXJfaWQiOiJraGtoNjExOTIiLCJlbWFpbCI6Imtoa2g2MTE5MkBnbWFpbC5jb20iLCJpcCI6IjQ5LjIxNi4xNjIuMjQ3In0.D6XR5DxxwrIqlEyI1T4JUDMQSbnx-83uDoKSJZfAPqc",
            DB_KEY: 'bond_v2026',
            PRICE_KEY: 'current_market_price_v2026',
            INITIAL_PRICE: 33.66,
            RETIRE_TARGET: "2031-03-15",
            VERSION_LOG: [
                { ver: "V2026.02.25 - 更新 22", logs: ["移除頁面頂部冗餘文字標籤，並於開發規範新增防呆條款。"] },
                { ver: "V2026.02.25 - 更新 21", logs: ["股票 Summary 新增「最新市價」欄位。","表格調整為 5 欄顯示，優化小螢幕資訊呈現。"] },
                { ver: "V2026.02.25 - 更新 20", logs: ["「交易」分頁重命名為「債券」。", "備份檔名優化：匯出檔名包含日期與時間。"] },
                { ver: "V2026.02.25 - 更新 19", logs: ["「現金」分頁 Summary 增強：顯示總額及各帳戶明細（含日期）。"] }
            ]
        };

        let state = { db: [], marketPrice: CONFIG.INITIAL_PRICE, stockPrices: {}, activeTab: 'records', lastSyncTime: "" };

        const CALC = {
            calcBalance(p, r, t, rt) { if (rt <= 0) return 0; const emi = this.calcEMI(p, r, t); const ir = r / 12 / 100; return ir === 0 ? emi * rt : (emi / ir) * (1 - Math.pow(1 + ir, -rt)); },
            calcEMI(p, r, t) { if (t <= 0) return 0; const ir = r / 12 / 100; return ir === 0 ? p / t : (p * ir * Math.pow(1 + ir, t)) / (Math.pow(1 + ir, t) - 1); },
            calcItemInterest(item, now) { if (!item.date || item.type !== 'loan') return 0; const start = new Date(item.date); const end = item.endDate ? new Date(item.endDate) : now; const days = Math.max(0, (Math.min(now, end) - start) / 86400000); return (item.price * (item.rate / 100) * (days / 365)); },
            getStats(targetDate = new Date(), customDB = state.db) {
                const stats = { sumB:0, sumC:0, sumBCost:0, sumO:0, sumD:0, sumSI:0, sumUI:0, loanP:0, sumCB:0, sumSVal:0, sumSCost:0, sumCash:0, stockDetails: {}, cashAccounts: {} };
                customDB.forEach(i => {
                    const idate = new Date(i.date); if (idate > targetDate) return;
                    const p = parseFloat(i.price) || 0, a = parseFloat(i.amount) || 0;
                    if (i.type === 'stock') {
                        const mktPrice = state.stockPrices[i.symbol] || p;
                        stats.sumSVal += a * mktPrice; stats.sumSCost += a * p;
                        if (!stats.stockDetails[i.symbol]) stats.stockDetails[i.symbol] = { shares: 0, cost: 0 };
                        stats.stockDetails[i.symbol].shares += a; stats.stockDetails[i.symbol].cost += a * p;
                    } else if (i.type === 'cash') {
                        const acc = i.account || "未分類帳戶";
                        if (!stats.cashAccounts[acc] || new Date(i.date) >= new Date(stats.cashAccounts[acc].date)) stats.cashAccounts[acc] = { price: p, date: i.date };
                    } else if (i.type === 'credit_loan') { stats.sumCB += i.customBalance > 0 ? i.customBalance : this.calcBalance(p, i.rate, i.totalTerm, i.remainingTerm); }
                    else if (i.type === 'loan') { stats.sumUI += this.calcItemInterest(i, targetDate); stats.loanP += p; }
                    else if (i.type === 'interest_expense') stats.sumSI += p;
                    else if (i.type === 'div') stats.sumD += p;
                    else if (i.location === 'domestic') {
                        if (i.type === 'buy') { stats.sumB += a; stats.sumC += (p * a * 1000); }
                        if (i.type === 'sell') { stats.sumB -= a; stats.sumC -= (p * a * 1000); }
                    } else {
                        if (i.type === 'buy') { stats.sumO += p; stats.sumC += p; } 
                        if (i.type === 'sell') { stats.sumO -= p; stats.sumC -= p; }
                    }
                });
                Object.values(stats.cashAccounts).forEach(v => stats.sumCash += v.price);
                return stats;
            }
        };

        const API = {
            async fetchPrices() {
                const dateStr = new Date(Date.now() - 864000000).toISOString().split('T')[0];
                try {
                    const res = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=00720B&start_date=${dateStr}&token=${CONFIG.FINMIND_TOKEN}`);
                    const json = await res.json();
                    if (json.msg === "success" && json.data.length > 0) {
                        state.marketPrice = parseFloat(json.data[json.data.length - 1].close);
                        localStorage.setItem(CONFIG.PRICE_KEY, state.marketPrice);
                        const n = new Date(); state.lastSyncTime = `${(n.getMonth()+1).toString().padStart(2,'0')}/${n.getDate().toString().padStart(2,'0')} ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
                    }
                    const syms = [...new Set(state.db.filter(i => i.type === 'stock' && i.symbol).map(i => i.symbol))];
                    for (let s of syms) {
                        const r = await fetch(`https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id=${s}&start_date=${dateStr}&token=${CONFIG.FINMIND_TOKEN}`);
                        const j = await r.json();
                        if (j.msg === "success" && j.data.length > 0) state.stockPrices[s] = parseFloat(j.data[j.data.length - 1].close);
                    }
                    UI.renderAll();
                } catch (e) { console.error("API Error", e); }
            }
        };

        const UI = {
            renderVersionHistory() {
                document.getElementById('versionListContainer').innerHTML = CONFIG.VERSION_LOG.map(v => `
                    <div><p class="text-xs font-black text-slate-400 uppercase font-black">${v.ver}</p><ul class="text-sm text-slate-600 list-disc ml-4 mt-1 font-bold">${v.logs.map(l => `<li>${l}</li>`).join('')}</ul></div>
                `).join('');
            },
            switchTab(t) { state.activeTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-'+t)); this.renderAll(); },
            
            renderSummary() {
                const s = CALC.getStats();
                const container = document.getElementById('summaryCard');
                
                if (state.activeTab === 'stocks') {
                    const stockPL = s.sumSVal - s.sumSCost;
                    let stockListHtml = Object.keys(s.stockDetails).map(sym => {
                        const d = s.stockDetails[sym];
                        const mktPrice = state.stockPrices[sym] || (d.cost / d.shares);
                        return `<div class="grid grid-cols-5 gap-1 text-[9px] py-1 border-b border-slate-50 last:border-0 items-center font-bold">
                            <span class="text-indigo-600 font-black">${sym}</span>
                            <span class="text-right">${d.shares.toLocaleString()}</span>
                            <span class="text-right text-slate-400">$${(d.cost / d.shares).toFixed(2)}</span>
                            <span class="text-right text-indigo-500">$${mktPrice.toFixed(2)}</span>
                            <span class="text-right font-black text-slate-700">$${Math.round(d.shares * mktPrice).toLocaleString()}</span>
                        </div>`;
                    }).join('');
                    container.innerHTML = `
                        <div class="mb-4">
                            <p class="text-xs text-slate-400 mb-1 font-bold">股票總市值 (包含緯創信託)</p>
                            <div class="flex justify-between items-end">
                                <h2 class="text-2xl font-black text-indigo-600 font-black">$${Math.round(s.sumSVal).toLocaleString()}</h2>
                                <span class="text-sm font-black ${stockPL >= 0 ? 'text-emerald-500' : 'text-rose-500'} font-black">${stockPL >= 0 ? '+' : ''}$${Math.round(stockPL).toLocaleString()}</span>
                            </div>
                            <p class="text-[9px] text-emerald-500 mt-1 font-normal">最後同步: ${state.lastSyncTime || '--'}</p>
                        </div>
                        <div class="space-y-2 pt-4 border-t border-slate-100">
                            <div class="flex justify-between text-sm font-bold"><span>股票總成本</span><span class="text-slate-500 font-bold">$${Math.round(s.sumSCost).toLocaleString()}</span></div>
                            <div class="mt-4 bg-slate-50 rounded-xl p-3 font-bold">
                                <div class="grid grid-cols-5 gap-1 text-[8px] text-slate-400 uppercase mb-1 font-black">
                                    <span>代號</span><span class="text-right">股數</span><span class="text-right">均價</span><span class="text-right">現價</span><span class="text-right">市值</span>
                                </div>
                                ${stockListHtml || '<p class="text-center text-[10px] text-slate-300 py-2">無持倉資料</p>'}
                            </div>
                        </div>`;
                } 
                else if (state.activeTab === 'cash') {
                    let cashListHtml = Object.keys(s.cashAccounts).map(acc => {
                        const d = s.cashAccounts[acc];
                        return `<div class="flex justify-between items-center py-2 border-b border-slate-50 last:border-0 font-bold"><div class="flex flex-col"><span class="text-xs font-black text-slate-700 font-black">${acc}</span><span class="text-[9px] text-slate-400 font-bold">最後更新: ${d.date}</span></div><span class="text-xs font-black text-emerald-600 font-black">$${d.price.toLocaleString()}</span></div>`;
                    }).join('');
                    container.innerHTML = `<div class="mb-4"><p class="text-xs text-slate-400 mb-1 font-bold">現金總額 (各帳戶最新餘額)</p><div class="flex justify-between items-end"><h2 class="text-3xl font-black text-emerald-600 tracking-tighter font-black">$${Math.round(s.sumCash).toLocaleString()}</h2></div></div><div class="space-y-2 pt-4 border-t border-slate-100 font-bold"><div class="mt-2 bg-slate-50 rounded-xl p-4 font-bold"><div class="flex justify-between text-[9px] text-slate-400 uppercase mb-2 font-black"><span>帳戶名稱 / 日期</span><span class="text-right">最新餘額</span></div>${cashListHtml || '<p class="text-center text-[10px] text-slate-300 py-2">無現金帳戶紀錄</p>'}</div></div>`;
                }
                else {
                    const mBond = (s.sumB * state.marketPrice * 1000) + s.sumO;
                    const bondPL = (mBond - s.sumC) + s.sumD - (s.sumSI + s.sumUI);
                    const netAssets = mBond + s.sumSVal + s.sumCash - s.sumUI - s.loanP - s.sumCB;
                    const avgPrice = s.sumB > 0 ? (s.sumC / (s.sumB * 1000)) : 0;

                    container.innerHTML = `
                        <div class="grid grid-cols-2 gap-4 mb-6 font-bold">
                            <div><p class="text-[11px] text-slate-400 mb-1 font-bold">國內債券 (張)</p><h2 class="text-3xl font-black text-indigo-600 tracking-tighter font-black">${s.sumB.toLocaleString()}</h2></div>
                            <div class="text-right">
                                <p class="text-[11px] text-slate-400 mb-1 text-right flex items-center justify-end font-bold">損益(債券) <i class="info-btn" onclick="UI.showHelp('損益計算', '公式：(市值 - 成本) + 累計配息 - 質押利息')">i</i></p>
                                <h2 class="text-2xl font-black tracking-tight font-black ${bondPL >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${bondPL >= 0 ? '+' : ''}$${Math.round(bondPL).toLocaleString()}</h2>
                            </div>
                        </div>
                        <div class="space-y-3.5 pt-5 border-t border-slate-100 font-bold text-slate-800">
                            <div class="flex justify-between items-center"><span class="text-sm font-black">00720B 市價 <span class="text-[9px] text-emerald-500 font-normal">(同步: ${state.lastSyncTime || '--'})</span></span><span onclick="UI.openPriceModal()" class="text-lg font-black text-indigo-600 underline cursor-pointer font-black">$${state.marketPrice.toFixed(2)}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>債券平均價位</span><span class="font-black">$${avgPrice.toFixed(2)}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>累計配息收入</span><span class="text-emerald-600 font-black font-black">$${Math.round(s.sumD).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>股票總市值 <span class="text-[9px] text-slate-400 font-normal">(包含緯創信託)</span></span><span class="font-black">$${Math.round(s.sumSVal).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>現金總額</span><span class="text-emerald-600 font-black font-black">$${Math.round(s.sumCash).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>已結算質押利息</span><span class="text-rose-500 font-black">-$${Math.round(s.sumSI).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>信貸總餘額</span><span class="text-rose-500 font-black">$${Math.round(s.sumCB).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>質押總金額</span><span class="font-black">$${Math.round(s.loanP).toLocaleString()}</span></div>
                            <div class="flex justify-between text-sm font-bold"><span>未結算質押利息</span><span class="text-rose-500 font-black">-$${Math.round(s.sumUI).toLocaleString()}</span></div>
                            <div class="flex justify-between pt-3 border-t font-black text-slate-800 bg-slate-50/50 p-3 rounded-2xl items-center mt-2 font-black">
                                <span class="text-base font-black">總資產 (淨值) <i class="info-btn" onclick="UI.showHelp('總資產計算', '計算公式：市值 - 負債')">i</i></span>
                                <span class="text-xl font-black text-indigo-700 font-black">$${Math.round(netAssets).toLocaleString()}</span>
                            </div>
                        </div>`;
                }
            },

            renderAll() { this.renderSummary(); this.renderList(); },
            renderList() {
                const view = document.getElementById('mainContentView'); view.innerHTML = ''; const now = new Date();
                if (state.activeTab === 'reports') { this.renderReports(view, now); return; }
                if (state.activeTab === 'retire') { this.renderRetirePage(view); return; }
                let filtered = [...state.db]; const tab = state.activeTab;
                if (tab==='pledge') filtered=filtered.filter(i=>i.type==='loan'||i.type==='interest_expense');
                else if (tab==='loan') filtered=filtered.filter(i=>i.type==='credit_loan');
                else if (tab==='stocks') filtered=filtered.filter(i=>i.type==='stock');
                else if (tab==='cash') filtered=filtered.filter(i=>i.type==='cash');
                else if (tab==='records') filtered=filtered.filter(i=>i.type==='buy'||i.type==='sell');
                else if (tab==='dividends') filtered=filtered.filter(i=>i.type==='div');
                else if (tab==='overseas') filtered=filtered.filter(i=>i.location==='overseas');
                filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
                if (filtered.length === 0) { view.innerHTML = '<p class="text-center py-10 text-slate-300 font-bold">尚無紀錄</p>'; return; }
                filtered.forEach(i => {
                    const card = document.createElement('div'); card.className = "bg-white p-5 rounded-[1.5rem] shadow-sm border border-slate-100 mb-3 font-bold text-slate-800";
                    let det = this.getRecordDetailHtml(i, now); const com = i.comment ? `<div class="text-[10px] text-indigo-400 italic mt-2 pt-2 border-t border-slate-50 font-bold"># ${i.comment}</div>` : '';
                    card.innerHTML = `<div class="flex justify-between items-start mb-2 font-bold"><div><span class="text-sm font-black ${i.type.includes('sell')||i.type.includes('loan')?'text-indigo-700 font-black':'text-emerald-700 font-black'}">${this.getLabel(i.type)}</span><div class="text-[10px] text-slate-400 font-bold">${i.date}</div></div><div class="flex gap-3"><button onclick="DATA.editRecord('${i.id}')" class="text-indigo-500 text-xs font-bold font-bold">編輯</button><button onclick="DATA.deleteRecord('${i.id}')" class="text-rose-400 text-xs font-bold font-bold">刪除</button></div></div><div class="bg-slate-50 p-3 rounded-xl font-bold font-bold">${det}</div>${com}`;
                    view.appendChild(card);
                });
            },
            getRecordDetailHtml(i, now) {
                if (i.type === 'stock') { const mktPrice = state.stockPrices[i.symbol] || i.price; const val = i.amount * mktPrice; const cost = i.amount * i.price; const pl = val - cost; return `<div class="text-xs text-indigo-600 font-black">市值: $${Math.round(val).toLocaleString()} (${i.symbol})</div><div class="text-[10px] text-slate-600 font-bold mt-1 font-bold">成本單價: $${i.price} | 最新現價: $${mktPrice}</div><div class="text-[10px] text-slate-400 font-bold font-bold">股數: ${i.amount.toLocaleString()} | 損益: <span class="${pl>=0?'text-emerald-500':'text-rose-500'}">${pl>=0?'+':''}${Math.round(pl).toLocaleString()}</span></div>`; }
                else if (i.type === 'cash') { return `<div class="text-xs text-emerald-600 font-black font-black">帳戶: ${i.account || "未分類"}</div><div class="text-xs text-emerald-600 font-bold font-bold">餘額: $${i.price.toLocaleString()}</div>`; }
                else if (i.type === 'credit_loan') { const bal = i.customBalance > 0 ? i.customBalance : CALC.calcBalance(i.price, i.rate, i.totalTerm, i.remainingTerm); return `<div class="text-xs text-rose-500 font-bold">剩餘本金: $${Math.round(bal).toLocaleString()}</div><div class="text-[10px] text-slate-400">年利 ${i.rate}%</div>`; }
                else if (i.type === 'loan') { const interest = CALC.calcItemInterest(i, now); return `<div class="text-xs text-indigo-600 font-bold">未結利息: $${Math.round(interest).toLocaleString()}</div><div class="text-[10px] text-slate-400">本金: $${i.price.toLocaleString()} | 利率: ${i.rate}%</div>`; }
                else if (i.type === 'div') { return `<div class="text-xs text-emerald-600 font-bold">實收: $${Math.round(i.price).toLocaleString()}</div><div class="text-[10px] text-slate-400 font-bold">${i.amount} 張 × 1000股</div>`; }
                return `<div class="text-xs text-slate-600 font-bold font-bold">單價: $${i.price} | 張數: ${i.amount}</div>`;
            },
            getLabel(t) { return {buy:'🔵 買入', sell:'🔴 賣出', div:'💰 配息', loan:'🏦 質押', credit_loan:'🏦 信貸', interest_expense:'➖ 利息', stock:'📈 股票', cash:'💵 現金'}[t] || t; },
            renderRetirePage(view) {
                const now = new Date(); const target = new Date(CONFIG.RETIRE_TARGET); let wDays = 0; let temp = new Date(now);
                while (temp < target) { if (temp.getDay() !== 0 && temp.getDay() !== 6) wDays++; temp.setDate(temp.getDate() + 1); }
                let y = target.getFullYear() - now.getFullYear(), m = target.getMonth() - now.getMonth(), d = target.getDate() - now.getDate();
                if (d < 0) { m -= 1; d += new Date(target.getFullYear(), target.getMonth(), 0).getDate(); }
                if (m < 0) { y -= 1; m += 12; }
                const card = document.createElement('div'); card.className = "bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center font-bold font-bold";
                card.innerHTML = `<div class="mb-8 font-bold font-bold"><h3 class="text-xl font-black text-slate-800 font-black">退休進度追蹤</h3><p class="text-[10px] text-slate-400 mt-1 uppercase font-black">${CONFIG.RETIRE_TARGET}</p></div><div class="space-y-6 font-bold"><div class="bg-slate-50 p-6 rounded-[2rem] font-bold"><p class="text-xs text-slate-400 mb-2 uppercase font-bold">剩餘時間</p><p class="text-2xl font-black text-indigo-700 font-black">${y}年 ${m}月 ${d}天</p></div><div class="bg-indigo-600 p-6 rounded-[2rem] text-white font-bold"><p class="text-xs text-white/60 mb-2 uppercase font-bold">預計工作天數</p><p class="text-3xl font-black font-black">${wDays.toLocaleString()} <span class="text-sm font-bold">DAYS</span></p></div></div>`;
                view.appendChild(card);
            },
            renderReports(view, now) {
                const s = CALC.getStats(now); const mB = (s.sumB * state.marketPrice * 1000) + s.sumO; const tA = mB + s.sumSVal + s.sumCash;
                const cPie = document.createElement('canvas'); view.appendChild(cPie);
                new Chart(cPie, { type: 'doughnut', data: { labels: ['債券', '股票', '現金'], datasets: [{ data: [mB, s.sumSVal, s.sumCash], backgroundColor: ['#3B7695', '#6366f1', '#10b981'] }] }, options: { plugins: { title: { display: true, text: '資產配置比例' }, legend: { labels: { generateLabels: (chart) => chart.data.labels.map((l, i) => ({ text: `${l} (${(chart.data.datasets[0].data[i]/tA*100).toFixed(1)}%)`, fillStyle: chart.data.datasets[0].backgroundColor[i], index: i })) } } } } });
                const cTr = document.createElement('canvas'); view.appendChild(cTr);
                let first = now; state.db.forEach(i => { let d = new Date(i.date); if (d < first) first = d; });
                const lbls = []; const pts = []; let curr = new Date(first.getFullYear(), first.getMonth(), 1);
                while (curr <= now) { lbls.push(`${curr.getMonth() + 1}月`); let st = CALC.getStats(new Date(curr.getFullYear(), curr.getMonth() + 1, 0)); let mb = (st.sumB * state.marketPrice * 1000) + st.sumO; pts.push(Math.round(mb + st.sumSVal + st.sumCash - st.sumUI - st.loanP - st.sumCB)); curr.setMonth(curr.getMonth() + 1); }
                new Chart(cTr, { type: 'line', data: { labels: lbls, datasets: [{ label: '淨值趨勢', data: pts, borderColor: '#3B7695', tension: 0.3, fill: true, backgroundColor: 'rgba(59, 118, 149, 0.1)' }] } });
            },
            closeAllModals() { document.getElementById('modalOverlay').classList.add('hidden'); ['dataModal','settingsModal','priceModal','excelModal','versionModal','helpModal'].forEach(m=>document.getElementById(m).classList.add('hidden')); },
            openModal() { this.closeAllModals(); document.getElementById('modalOverlay').classList.replace('hidden','flex'); document.getElementById('dataModal').classList.remove('hidden'); document.getElementById('editId').value=''; this.toggleFormFields(); },
            openSettingsModal() { this.closeAllModals(); document.getElementById('settingsModal').classList.remove('hidden'); },
            openVersionModal() { this.renderVersionHistory(); this.closeAllModals(); document.getElementById('modalOverlay').classList.replace('hidden','flex'); document.getElementById('versionModal').classList.remove('hidden'); },
            openPriceModal() { this.closeAllModals(); document.getElementById('modalOverlay').classList.replace('hidden','flex'); document.getElementById('priceModal').classList.remove('hidden'); document.getElementById('mPriceInput').value = state.marketPrice; },
            openExcelModal() { this.closeAllModals(); document.getElementById('modalOverlay').classList.replace('hidden','flex'); document.getElementById('excelModal').classList.remove('hidden'); },
            showHelp(title, content) { this.closeAllModals(); document.getElementById('modalOverlay').classList.replace('hidden', 'flex'); document.getElementById('helpTitle').innerText = title; document.getElementById('helpContent').innerText = content; document.getElementById('helpModal').classList.remove('hidden'); },
            closeHelp() { document.getElementById('helpModal').classList.add('hidden'); document.getElementById('modalOverlay').classList.add('hidden'); },
            closeVersionModal() { document.getElementById('versionModal').classList.add('hidden'); document.getElementById('modalOverlay').classList.add('hidden'); },
            toggleFormFields() {
                const t = document.getElementById('fType').value; const isC=(t==='credit_loan'), isS=(t==='stock'), isCash=(t==='cash');
                document.getElementById('accountField').classList.toggle('hidden', !isCash);
                document.getElementById('stockFields').classList.toggle('hidden', !isS); 
                document.getElementById('fCreditGroup').classList.toggle('hidden', !isC);
                document.getElementById('fRateGroup').classList.toggle('hidden', t!=='loan' && !isC); 
                document.getElementById('fEndDateGroup').classList.toggle('hidden', t!=='loan');
                document.getElementById('fAmountGroup').classList.toggle('hidden', isC || t==='loan' || isCash);
            }
        };

        const DATA = {
            init() { const r = localStorage.getItem(CONFIG.DB_KEY); const p = localStorage.getItem(CONFIG.PRICE_KEY); if (p) state.marketPrice = parseFloat(p) || CONFIG.INITIAL_PRICE; state.db = r ? JSON.parse(r) : []; },
            saveRecord() {
                const id = document.getElementById('editId').value;
                const r = { id: id || Date.now() + Math.random(), location: document.getElementById('fLocation').value, type: document.getElementById('fType').value, account: document.getElementById('fAccount').value, date: document.getElementById('fDate').value, endDate: document.getElementById('fEndDate').value, amount: parseFloat(document.getElementById('fAmount').value)||0, price: parseFloat(document.getElementById('fPrice').value)||0, rate: parseFloat(document.getElementById('fRate').value)||0, totalTerm: parseFloat(document.getElementById('fTotalTerm').value)||0, remainingTerm: parseFloat(document.getElementById('fRemainingTerm').value)||0, dueDay: parseFloat(document.getElementById('fDueDay').value)||0, comment: document.getElementById('fComment').value || '', symbol: document.getElementById('fSymbol').value };
                state.db = id ? state.db.map(x => x.id == id ? r : x) : [...state.db, r]; this.sync(); UI.closeAllModals(); UI.renderAll();
            },
            editRecord(id) {
                const r = state.db.find(i => i.id == id); if (!r) return; UI.openModal();
                document.getElementById('editId').value = r.id; document.getElementById('fLocation').value = r.location; document.getElementById('fType').value = r.type; document.getElementById('fAccount').value = r.account || ''; document.getElementById('fDate').value = r.date; document.getElementById('fPrice').value = r.price; document.getElementById('fRate').value = r.rate; document.getElementById('fTotalTerm').value = r.totalTerm || ''; document.getElementById('fRemainingTerm').value = r.remainingTerm || ''; document.getElementById('fComment').value = r.comment; document.getElementById('fAmount').value = r.amount; document.getElementById('fSymbol').value = r.symbol || '';
                UI.toggleFormFields();
            },
            deleteRecord(id) { if(confirm('確定刪除？')){ state.db=state.db.filter(i=>i.id!=id); this.sync(); UI.renderAll(); } },
            sync() { localStorage.setItem(CONFIG.DB_KEY, JSON.stringify(state.db)); },
            resetAll() { if(confirm('重設所有資料？')){ localStorage.clear(); location.reload(); } },
            updateManualPrice() { const v = parseFloat(document.getElementById('mPriceInput').value); if(v>0){ state.marketPrice=v; localStorage.setItem(CONFIG.PRICE_KEY, v); UI.closeAllModals(); UI.renderAll(); } },
            exportJSON() {
                const n = new Date(); const Y = n.getFullYear(); const M = (n.getMonth() + 1).toString().padStart(2, '0'); const D = n.getDate().toString().padStart(2, '0'); const hh = n.getHours().toString().padStart(2, '0'); const mm = n.getMinutes().toString().padStart(2, '0');
                const ts = `${Y}${M}${D}_${hh}${mm}`;
                const b = new Blob([JSON.stringify(state.db, null, 2)], {type:'application/json'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `assets_backup_${ts}.json`; a.click();
            },
            triggerImport() { document.getElementById('importFile').click(); },
            handleFileImport(e) { const f = e.target.files[0]; const reader = new FileReader(); reader.onload = (ev) => { try { state.db = JSON.parse(ev.target.result); this.sync(); location.reload(); } catch(e) { alert('格式錯誤'); } }; reader.readAsText(f); },
            syncToLine() { window.location.href = `line://msg/text/?${encodeURIComponent(JSON.stringify(state.db))}`; },
            processExcel() {
                const raw = document.getElementById('excelPasteArea').value; const lines = raw.trim().split('\n'); let count = 0;
                lines.forEach(line => { const cols = line.split('\t'); if (cols.length >= 3) { state.db.push({ id: Date.now() + Math.random(), location: 'domestic', type: 'buy', date: cols[0].trim().replace(/\//g, '-'), amount: parseFloat(cols[1].trim()), price: parseFloat(cols[2].trim()) }); count++; } });
                if (count > 0) { this.sync(); UI.renderAll(); UI.closeAllModals(); alert(`成功匯入 ${count} 筆`); }
            }
        };

        window.onload = () => { DATA.init(); API.fetchPrices(); UI.renderAll(); };
    </script>
</body>
</html>
